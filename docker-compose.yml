services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: sh -c "rm -rf /app/.next/* && npm install --no-package-lock && npm run dev -- --hostname 0.0.0.0"

volumes:
  node_modules:
  next_cache:
